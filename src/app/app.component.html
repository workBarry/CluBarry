<div class="site-shell">
  <header class="site-header">
    <a class="brand" routerLink="/">
      <span class="brand-mark">CM</span>
      <span>
        <strong>ClubWeb</strong>
        <small>社團前台</small>
      </span>
    </a>

    <div class="user-chip" *ngIf="auth.currentUser() as user; else loginLink">
      <a class="bell-icon" routerLink="/notifications" title="通知">🔔</a>
      <span (click)="toggleDrawer()" style="cursor:pointer">{{ user.avatar }}</span>
      <div (click)="toggleDrawer()" style="cursor:pointer">
        <strong>{{ user.name }}</strong>
        <small>{{ user.role }}</small>
      </div>
    </div>
    <ng-template #loginLink>
      <div class="user-chip">
        <a class="btn primary small" routerLink="/login">登入</a>
        <a class="btn secondary small" routerLink="/register">註冊</a>
      </div>
    </ng-template>
  </header>
  <nav class="main-nav" aria-label="主要導覽">
    <a *ngFor="let item of navItems" [routerLink]="item.path" routerLinkActive="active" [routerLinkActiveOptions]="item.exact ? { exact: true } : { exact: false }">
      {{ item.label }}
    </a>
  </nav>

  <main>
    <router-outlet />
  </main>

  <div class="drawer-backdrop" *ngIf="drawerOpen" (click)="closeDrawer()"></div>
  <aside class="drawer" [class.open]="drawerOpen">
    <div class="drawer-header">
      <span *ngIf="auth.currentUser() as user">{{ user.name }}</span>
      <button class="drawer-close" (click)="closeDrawer()">✕</button>
    </div>
    <nav class="drawer-nav">
      <a *ngFor="let item of drawerItems" [routerLink]="item.path" (click)="closeDrawer()">{{ item.label }}</a>
    </nav>
    <div class="drawer-footer">
      <button class="btn ghost" (click)="closeDrawer(); auth.logout()">登出</button>
    </div>
  </aside>
</div>
